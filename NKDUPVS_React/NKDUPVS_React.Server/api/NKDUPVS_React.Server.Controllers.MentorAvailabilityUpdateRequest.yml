  namespace: NKDUPVS_React.Server.Controllers
  summary: Request model for updating a mentor's availability status. This model contains the mentor's unique code and a boolean value indicating whether the mentor is currently accepting mentees or not. The MentorAvailabilityUpdateRequest is used in the UpdateAvailability endpoint of the MentorController to allow mentors to easily update their availability status in the application. By providing their mentor code and availability status, mentors can ensure that they are accurately represented in the system, allowing mentees to find mentors who are currently accepting new mentees when searching for mentorship opportunities in the frontend application.
