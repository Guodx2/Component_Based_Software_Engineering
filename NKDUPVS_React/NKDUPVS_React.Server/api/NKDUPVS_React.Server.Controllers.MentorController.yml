  namespace: NKDUPVS_React.Server.Controllers
  summary: Updates the availability status of a mentor to indicate whether they are accepting mentees or not. The method takes a MentorAvailabilityUpdateRequest object as input, which contains the mentor's code and their availability status. It first retrieves the mentor record from the database using the provided mentor code. If the mentor is found, it updates the AcceptingMentees property with the new availability status and saves the changes to the database. If the mentor is not found, it returns a 404 Not Found response. Finally, if the update is successful, it returns an Ok response indicating that the operation was completed successfully. This endpoint allows mentors to easily update their availability status for mentees in the application.
  example: []
  syntax:
    content: >-
      [HttpPost("updateAvailability")]

      public Task<IActionResult> UpdateAvailability(MentorAvailabilityUpdateRequest request)
    parameters:
    - id: request
      type: NKDUPVS_React.Server.Controllers.MentorAvailabilityUpdateRequest
      description: The request containing the mentor's code and availability status.
