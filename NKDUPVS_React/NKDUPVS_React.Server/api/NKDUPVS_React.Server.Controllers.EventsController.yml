  summary: Retrieves a list of upcoming affairs from the database, including their associated event details. The method filters affairs based on their event's start time, returning only those that are scheduled to occur in the future. The returned data includes the affair ID, event ID, event name, start time, end time, address, and any comments associated with the event. This endpoint is typically used to display upcoming affairs to users, allowing them to see what events are scheduled and plan accordingly.
