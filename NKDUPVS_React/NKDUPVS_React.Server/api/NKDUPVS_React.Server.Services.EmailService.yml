  namespace: NKDUPVS_React.Server.Services
  summary: Sends an email asynchronously to the specified recipient with the given subject, plain text content, and HTML content using the SendGrid service. This method constructs an email message using the sender information and recipient details, and then uses the SendGrid client to send the email. The asynchronous nature of this method allows for non-blocking email sending, improving the performance and responsiveness of the application when sending emails.
  example: []
  syntax:
    content: public Task SendEmailAsync(string toEmail, string subject, string plainText, string htmlContent)
    parameters:
    - id: toEmail
      type: System.String
      description: The email address of the recipient.
    - id: subject
      type: System.String
      description: The subject of the email.
    - id: plainText
      type: System.String
      description: The plain text content of the email.
    - id: htmlContent
      type: System.String
      description: The HTML content of the email.
    return:
      type: System.Threading.Tasks.Task
      description: A task representing the asynchronous operation.
    content.vb: Public Function SendEmailAsync(toEmail As String, subject As String, plainText As String, htmlContent As String) As Task
