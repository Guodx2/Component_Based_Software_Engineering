  summary: Implementation of the IEmailService interface using SendGrid to send emails. This class retrieves the SendGrid API key and sender information from the application configuration, and uses the SendGrid client to create and send emails based on the provided recipient, subject, and content. The SendEmailAsync method constructs the email message and sends it asynchronously, allowing for efficient email delivery without blocking the main thread of the application.
