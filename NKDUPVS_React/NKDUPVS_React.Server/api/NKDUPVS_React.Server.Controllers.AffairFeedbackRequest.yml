  summary: An optional comment for the affair feedback. This field allows the mentee to provide additional context or details about their rating of the affair. While it is not required, it can be useful for providing more specific feedback on what aspects of the affair were particularly good or could be improved. The comment will be stored along with the rating and can be displayed when retrieving feedback for the affair.
