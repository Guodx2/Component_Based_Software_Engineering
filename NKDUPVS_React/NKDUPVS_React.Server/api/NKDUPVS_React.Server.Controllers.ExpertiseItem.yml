  namespace: NKDUPVS_React.Server.Controllers
  summary: Represents an individual expertise item for a mentor, containing information about the study program, specialization, and priority level. This class is used as part of the MentorExpertiseUpdateRequest to specify the areas of expertise that a mentor has. The StudyProgram property indicates the specific academic program associated with the expertise, while the Specialization property can provide additional details about the mentor's focus within that study program. The Priority property can be used to indicate the importance or relevance of this expertise area when matching mentors with mentees based on their academic interests in the application.
