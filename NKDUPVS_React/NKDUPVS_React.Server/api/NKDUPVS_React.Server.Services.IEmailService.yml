  namespace: NKDUPVS_React.Server.Services
  summary: Sends an email asynchronously to the specified recipient with the given subject, plain text content, and HTML content. This method is used to send various types of emails, such as account verification, password reset, or notifications, by providing the necessary email details and allowing for asynchronous execution to improve performance and responsiveness of the application.
  example: []
  syntax:
    content: Task SendEmailAsync(string toEmail, string subject, string plainText, string htmlContent)
    parameters:
    - id: toEmail
      type: System.String
      description: The email address of the recipient.
    - id: subject
      type: System.String
      description: The subject of the email.
    - id: plainText
      type: System.String
      description: The plain text content of the email.
    - id: htmlContent
      type: System.String
      description: The HTML content of the email.
    return:
      type: System.Threading.Tasks.Task
      description: A task representing the asynchronous operation.
    content.vb: Function SendEmailAsync(toEmail As String, subject As String, plainText As String, htmlContent As String) As Task
