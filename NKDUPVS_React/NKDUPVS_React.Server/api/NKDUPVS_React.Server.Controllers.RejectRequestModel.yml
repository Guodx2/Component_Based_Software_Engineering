  namespace: NKDUPVS_React.Server.Controllers
  summary: Request model for rejecting a mentor request. This model contains a single property, Reason, which is a string that allows mentors to provide a reason for rejecting a mentorship request from a mentee. The RejectRequestModel is used in the RejectRequest endpoint of the MentorController to capture the rejection reason when a mentor decides to reject a mentorship request. By providing a reason for rejection, mentors can offer feedback to mentees, which can be helpful for mentees to understand why their request was rejected and potentially improve their chances of being accepted by other mentors in the future. Additionally, this information can be included in email notifications sent to mentees to inform them about the rejection of their mentorship request.
