  summary: The ID of the semester plan task for which to create feedback. This is a nullable integer to allow for flexibility in the feedback creation process, as feedback can also be created for trainings and affairs which do not use this field. When creating feedback for a semester plan task, this field should be provided to associate the feedback with the correct task.
